spring:
  application:
    name: user-auth

  datasource:
    url: jdbc:postgresql://ep-old-surf-a1gittp7-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require

    username: ${DB_USERNAME:neondb_owner}

    password: ${DB_PASSWORD:npg_c3tJkuFvb0so}

    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      keepalive-time: 30000


  jpa:
    hibernate:
      ddl-auto: update            # creates/updates tables automatically
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8081
  servlet:
    context-path: /api/v1

app:
  jwt:
    secret: ${JWT_SECRET:ThisIsAVeryLongSecretKeyForLegalAidPlatformThatMustBeAtLeast256BitsLong!}
    access-token-expiration-ms: 900000        # 15 minutes
    refresh-token-expiration-days: 30

logging:
  level:
    com.legalaid.userauth: DEBUG
    org.springframework.security: INFO
